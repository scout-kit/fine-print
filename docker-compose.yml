services:
  app:
    build: .
    ports:
      - "8080:80"
      - "5173:5173"
    volumes:
      - .:/app
      - go-modules:/go/pkg/mod
      - app-data:/app/data
    environment:
      - FINEPRINT_DEV=1
      - FINEPRINT_PORT=80
      - FINEPRINT_DB_DRIVER=sqlite

  # Optional: uncomment to develop against MySQL
  # mysql:
  #   image: mysql:8
  #   environment:
  #     MYSQL_ROOT_PASSWORD: root
  #     MYSQL_DATABASE: fineprint
  #     MYSQL_USER: fineprint
  #     MYSQL_PASSWORD: fineprint
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - mysql-data:/var/lib/mysql

volumes:
  go-modules:
  app-data:
  # mysql-data:
